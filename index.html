<!DOCTYPE html>
<html>
<head>
  <title>SeisMark</title>

  <!-- Ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0d0d0d, #000);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-top: 20px;
    }

    .logo {
      width: 60px;
      margin-top: 20px;
      filter: drop-shadow(0 0 10px #ff00ff);
    }

    input {
      padding: 12px;
      width: 80%;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: white;
      font-size: 16px;
    }

    .badge {
      margin: 30px auto;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      animation: glow 2s infinite alternate;
    }

    img {
      width: 100%;
      border-radius: 50%;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #ff00ff; }
      to { box-shadow: 0 0 35px #00ffff; }
    }
  </style>
</head>

<body>

<div class="container">

<!-- 🔥 LOGO -->
<img class="logo" src="https://i.imgur.com/8Km9tLL.png" />

<h1>SeisMark</h1>
<p>Proof of Seismic Contribution</p>

<button onclick="connectWallet()">🔗 Connect Wallet</button>
<p id="wallet"></p>

<input id="username" placeholder="Enter X username" />

<button onclick="loadPfp()">Load PFP</button>

<div id="preview"></div>

<button onclick="mint()">Mint SeisMark</button>

</div>

<script>
let provider;
let signer;

// CONNECT WALLET (simple & stable)
async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask / Trust Wallet");
    return;
  }

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);

  signer = await provider.getSigner();
  const address = await signer.getAddress();

  document.getElementById("wallet").innerText =
    "Connected: " + address;
}

// LOAD PFP
function loadPfp() {
  let user = document.getElementById("username").value;
  let url = `https://unavatar.io/twitter/${user}`;

  document.getElementById("preview").innerHTML =
    `<div class="badge"><img src="${url}"/></div>`;
}

// MINT (payment)
async function mint() {
  if (!signer) {
    alert("Connect wallet first");
    return;
  }

  try {
    const tx = await signer.sendTransaction({
      to: "0x656F533830C5F1E53E1385722032BbA9eB3eBA22",
      value: ethers.parseEther("0.001")
    });

    await tx.wait();

    alert("✅ Mint Success 🌊");
  } catch (err) {
    alert("❌ Transaction failed");
  }
}
</script>

</body>
</html>
