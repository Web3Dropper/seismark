<!DOCTYPE html>
<html>
<head>
  <title>SeisMark</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 5px;
    }

    p {
      opacity: 0.7;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      width: 90%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .card {
      background: #111;
      padding: 10px;
      border-radius: 12px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>🌊 SeisMark</h1>
<p>Proof of Seismic Contribution</p>

<button onclick="connectWallet()">🔗 Connect Wallet</button>
<p id="wallet"></p>

<input id="username" placeholder="Enter X username" />

<button onclick="mint()">🚀 Mint NFT</button>

<h2>📦 Collection</h2>
<div class="grid" id="gallery"></div>

</div>

<script>
let provider;
let signer;

const contractAddress = "0x291653CF72cf83BAb4EDB661C9cC63dD391A4aaB";

const abi = [
  "function mint(string memory _uri) public payable",
  "function totalSupply() public view returns(uint)",
  "function getNFT(uint id) public view returns(address,string)"
];

// 🔗 CONNECT WALLET + SEISMIC
async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask");
    return;
  }

  const chainId = "0x1404";

  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId }]
    });
  } catch (err) {
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [{
        chainId: chainId,
        chainName: "Seismic Testnet",
        rpcUrls: ["https://gcp-2.seismictest.net/rpc"],
        nativeCurrency: {
          name: "ETH",
          symbol: "ETH",
          decimals: 18
        }
      }]
    });
  }

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();

  const address = await signer.getAddress();
  document.getElementById("wallet").innerText =
    "Connected: " + address + " 🌊";

  loadCollection();
}

// 🚀 MINT NFT
async function mint() {
  if (!signer) {
    alert("Connect wallet first");
    return;
  }

  let user = document.getElementById("username").value;

  if (!user) {
    alert("Enter username");
    return;
  }

  let img = `https://unavatar.io/twitter/${user}`;

  try {
    const contract = new ethers.Contract(contractAddress, abi, signer);

    const tx = await contract.mint(img, {
      value: ethers.parseEther("0.0001")
    });

    await tx.wait();

    alert("✅ NFT Minted 🌊");

    loadCollection();

  } catch (err) {
    console.log(err);
    alert("❌ Mint failed");
  }
}

// 📦 LOAD COLLECTION FROM BLOCKCHAIN
async function loadCollection() {
  const contract = new ethers.Contract(contractAddress, abi, provider);

  const total = await contract.totalSupply();

  document.getElementById("gallery").innerHTML = "";

  for (let i = 1; i <= total; i++) {
    try {
      const data = await contract.getNFT(i);

      const img = data[1];

      let div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${img}" />
        <p>SeisMark #${i}</p>
      `;

      document.getElementById("gallery").appendChild(div);
    } catch (err) {
      console.log(err);
    }
  }
}
</script>

</body>
</html>
