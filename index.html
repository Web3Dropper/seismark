<!DOCTYPE html>
<html>
<head>
  <title>SeisMark</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0d0d0d, #000);
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 26px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: white;
      font-size: 16px;
    }

    .badge {
      margin: 25px auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      animation: glow 2s infinite alternate;
    }

    img {
      width: 100%;
      border-radius: 50%;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #ff00ff; }
      to { box-shadow: 0 0 35px #00ffff; }
    }

    @media (min-width: 768px) {
      .container {
        max-width: 500px;
      }
    }
  </style>
</head>

<body>

<div class="container">

<h1>🌊 SeisMark</h1>
<p>Proof of Seismic Contribution</p>

<button onclick="connectWallet()">🔗 Connect Wallet</button>
<p id="wallet"></p>

<input id="username" placeholder="Enter X username" />

<button onclick="loadPfp()">Load PFP</button>

<div id="preview"></div>

<button onclick="mint()">Mint SeisMark</button>

</div>

<script>
let provider;
let signer;

// 🔗 CONNECT + FORCE SEISMIC
async function connectWallet() {
  if (!window.ethereum) {
    alert("Install wallet");
    return;
  }

  const chainId = "0x1404";

  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId }]
    });
  } catch (err) {
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [{
        chainId: chainId,
        chainName: "Seismic Testnet",
        rpcUrls: ["https://gcp-2.seismictest.net/rpc"],
        nativeCurrency: {
          name: "ETH",
          symbol: "ETH",
          decimals: 18
        }
      }]
    });
  }

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);

  signer = await provider.getSigner();
  const address = await signer.getAddress();

  document.getElementById("wallet").innerText =
    "Connected: " + address + " 🌊";
}

// 🖼️ LOAD PFP
function loadPfp() {
  let user = document.getElementById("username").value;
  let url = `https://unavatar.io/twitter/${user}`;

  document.getElementById("preview").innerHTML =
    `<div class="badge"><img src="${url}"/></div>`;
}

// 💰 MINT FIXED
async function mint() {
  if (!signer) {
    alert("Connect wallet first");
    return;
  }

  try {
    const tx = await signer.sendTransaction({
      to: "0x656F533830C5F1E53E1385722032BbA9eB3eBA22",
      value: ethers.parseEther("0.0001") // 👈 kam kar diya
    });

    await tx.wait();

    alert("✅ Mint success on Seismic 🌊");
  } catch (err) {
    console.log(err);
    alert("❌ Failed: Check network or balance");
  }
}
</script>

</body>
</html>
