<!DOCTYPE html>
<html>
<head>
  <title>SeisMark</title>

  <!-- WalletConnect + Ethers -->
  <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.min.js"></script>
  <script src="https://unpkg.com/web3modal"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

  <style>
    body {
      background: radial-gradient(circle, #0d0d0d, #000);
      color: white;
      text-align: center;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
    }

    input {
      padding: 12px;
      width: 80%;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: white;
      font-size: 16px;
    }

    .badge {
      margin: 30px auto;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      animation: glow 2s infinite alternate;
    }

    img {
      width: 100%;
      border-radius: 50%;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #ff00ff; }
      to { box-shadow: 0 0 35px #00ffff; }
    }
  </style>
</head>

<body>

<h1>🌊 SeisMark</h1>
<p>Proof of Seismic Contribution</p>

<button onclick="connectWallet()">🔗 Connect Wallet</button>
<p id="wallet"></p>

<input id="username" placeholder="Enter X username" />

<button onclick="loadPfp()">Load PFP</button>

<div id="preview"></div>

<button onclick="mint()">Mint SeisMark</button>

<script>
let provider;
let signer;
let web3Modal;

const providerOptions = {
  walletconnect: {
    package: window.WalletConnectProvider.default,
    options: {
      rpc: {
        5124: "https://gcp-2.seismictest.net/rpc"
      }
    }
  }
};

window.onload = function () {
  web3Modal = new window.Web3Modal.default({
    cacheProvider: false,
    providerOptions
  });
};

async function connectWallet() {
  const instance = await web3Modal.connect();
  provider = new ethers.providers.Web3Provider(instance);
  signer = provider.getSigner();

  const address = await signer.getAddress();
  document.getElementById("wallet").innerText =
    "Connected: " + address;
}

function loadPfp() {
  let user = document.getElementById("username").value;
  let url = `https://unavatar.io/twitter/${user}`;

  document.getElementById("preview").innerHTML =
    `<div class="badge"><img src="${url}"/></div>`;
}

async function mint() {
  if (!signer) {
    alert("Connect wallet first");
    return;
  }

  try {
    const tx = await signer.sendTransaction({
      to: "0x656F533830C5F1E53E1385722032BbA9eB3eBA22",
      value: ethers.utils.parseEther("0.001")
    });

    await tx.wait();

    alert("✅ Minted on Seismic 🌊");
  } catch (err) {
    alert("Transaction failed");
  }
}
</script>

</body>
</html>
