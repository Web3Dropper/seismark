<!DOCTYPE html>
<html>
<head>
  <title>SeisMark</title>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0d0d0d, #000);
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .badge {
      margin: 25px auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      animation: glow 2s infinite alternate;
    }

    img {
      width: 100%;
      border-radius: 50%;
    }

    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .card {
      background: #111;
      padding: 10px;
      border-radius: 10px;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #ff00ff; }
      to { box-shadow: 0 0 30px #00ffff; }
    }
  </style>
</head>

<body>

<div class="container">

<h1>🌊 SeisMark</h1>
<p>Proof of Seismic Contribution</p>

<button onclick="connectWallet()">🔗 Connect Wallet</button>
<p id="wallet"></p>

<input id="username" placeholder="Enter X username" />

<button onclick="loadPfp()">Load PFP</button>

<div id="preview"></div>

<button onclick="mint()">Mint NFT</button>

<div class="grid" id="gallery"></div>

</div>

<script>
let provider;
let signer;

const contractAddress = "0x291653CF72cf83BAb4EDB661C9cC63dD391A4aaB";

const abi = [
  "function mint(string memory _uri) public payable"
];

// 🔗 CONNECT WALLET + SEISMIC
async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask");
    return;
  }

  const chainId = "0x1404";

  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId }]
    });
  } catch (err) {
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [{
        chainId: chainId,
        chainName: "Seismic Testnet",
        rpcUrls: ["https://gcp-2.seismictest.net/rpc"],
        nativeCurrency: {
          name: "ETH",
          symbol: "ETH",
          decimals: 18
        }
      }]
    });
  }

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);

  signer = await provider.getSigner();
  const address = await signer.getAddress();

  document.getElementById("wallet").innerText =
    "Connected: " + address;
}

// 🖼️ LOAD PFP
function loadPfp() {
  let user = document.getElementById("username").value;
  let url = `https://unavatar.io/twitter/${user}`;

  document.getElementById("preview").innerHTML =
    `<div class="badge"><img src="${url}"/></div>`;
}

// 🚀 MINT NFT
async function mint() {
  if (!signer) {
    alert("Connect wallet first");
    return;
  }

  let user = document.getElementById("username").value;
  let img = `https://unavatar.io/twitter/${user}`;

  try {
    const contract = new ethers.Contract(contractAddress, abi, signer);

    const tx = await contract.mint(img, {
      value: ethers.parseEther("0.0001")
    });

    await tx.wait();

    addToGallery(img);

    alert("✅ NFT Minted Successfully 🌊");
  } catch (err) {
    console.log(err);
    alert("❌ Mint failed");
  }
}

// 🖼️ ADD TO UI
function addToGallery(img) {
  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<img src="${img}" /><p>SeisMark</p>`;
  document.getElementById("gallery").appendChild(div);
}
</script>

</body>
</html>
